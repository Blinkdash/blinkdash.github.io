<body>
<div class="flex_container" tabindex="256">
  <div class="first_letter">
    <svg id="first_letter" viewBox="0 0 100 100">
      <symbol id="text1">
        <text style="text-anchor: middle;" x="30%" y="73%">Г</text>
      </symbol>
      <circle id="circle" class="g_circle" cx="0" cy="0" r="2" stroke="black" stroke-width="1" fill="black"/>
      <use xlink:href="#text1"></use>
    </svg>
  </div>
  <div class="second_letter">
    <svg viewBox="0 0 100 100">
      <symbol id="text2">
        <text style="text-anchor: middle;" x="40%" y="62%">Д</text>
      </symbol>
      <circle id="circle" class="d_circle" cx="0" cy="0" r="2" stroke="black" stroke-width="1" fill="black"/>
      <use xlink:href="#text2"></use>
    </svg>

  </div>
  <div class="image_container">
    <div class="text">Галин Денис</div>
    <video id="stas" loop>
      <source src="styles/video/1.mp4" type="video/mp4">
    </video>
  </div>
</div>
<script>
  const focusTrigger = document.querySelector('.flex_container');
  const video = document.getElementById('stas');

  focusTrigger.addEventListener('focus', function() {
    video.currentTime = 0;
    setTimeout(() => {
      video.play();
    }, 2500);
  });

  focusTrigger.addEventListener('blur', function() {
    video.pause();
  });
</script>

</body>
